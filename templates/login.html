<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>

/* Page Background */
body{
    margin:0;
    padding:0;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg,#1f4037,#99f2c8);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* Login Card */
.login-container{
    width:350px;
    padding:40px;
    border-radius:15px;

    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);

    box-shadow:0 8px 30px rgba(0,0,0,0.3);
}

/* Title */
.login-container h2{
    text-align:center;
    margin-bottom:25px;
    color:white;
}

/* Input fields */
input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    outline:none;
    font-size:14px;
}

/* Button */
button{
    width:100%;
    padding:12px;
    margin-top:15px;

    background:#ff7e5f;
    background: linear-gradient(to right,#ff7e5f,#feb47b);

    border:none;
    border-radius:8px;

    color:white;
    font-size:16px;
    cursor:pointer;

    transition:0.3s;
}

/* Button Hover */
button:hover{
    transform:scale(1.05);
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* Small text */
p{
    text-align:center;
    margin-top:15px;
    color:white;
}

</style>
</head>
<body>
<div class="box">
<h2>Login</h2>
<form method="POST">
    <input type="text" name="username" placeholder="Enter Username" required>
    <input type="password" name="password" placeholder="Enter Password" required>
    <button type="submit">Login</button>
</form>
<a href="/register">Create Account</a>
</div>
</body>
</html>
