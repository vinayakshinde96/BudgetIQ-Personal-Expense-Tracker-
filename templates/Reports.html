<!DOCTYPE html>
<html>
<head>
    <title>Reports - BudgetIQ</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #36b9cc, #4e73df);
            padding: 40px;
            color: #333;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0px 5px 15px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .total {
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 25px;
            color: #e74a3b;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #4e73df;
            color: white;
        }

        tr:hover {
            background: #f1f1f1;
        }

        .back {
            margin-top: 20px;
            text-align: center;
        }

        .back a {
            text-decoration: none;
            padding: 8px 15px;
            background: #1cc88a;
            color: white;
            border-radius: 5px;
        }

        .back a:hover {
            background: #17a673;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Expense Reports</h2>

    <div class="total">
        Total Expense: ₹ {{ total if total else 0 }}
    </div>

    <h3 style="text-align:center;">Category Wise Expense</h3>

    <table>
        <tr>
            <th>Category</th>
            <th>Total Amount (₹)</th>
        </tr>

        {% for row in category_data %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
        </tr>
        {% endfor %}
    </table>

    <div class="back">
        <a href="/dashboard">Back to Dashboard</a>
    </div>
</div>

</body>
</html>
