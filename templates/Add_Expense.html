<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - BudgetIQ</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
            padding: 40px;
        }

        h2 {
            text-align: center;
        }

        .container {
            width: 80%;
            margin: auto;
        }

        .form-box {
            background: white;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            margin-bottom: 30px;
        }

        input, button {
            padding: 8px;
            margin: 5px;
        }

        button {
            background: #4CAF50;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        th, td {
            padding: 10px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #2196F3;
            color: white;
        }

        tr:hover {
            background: #f1f1f1;
        }

        .links {
            margin-top: 20px;
            text-align: center;
        }

        .links a {
            margin: 0 10px;
            padding: 8px 12px;
            background: #333;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .links a:hover {
            background: #555;
        }

        .total-box {
            text-align: right;
            margin-top: 15px;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="container">

    <h2>Welcome, {{ name }}</h2>

    <!-- ADD EXPENSE FORM -->
    <div class="form-box">
        <h3>Add Expense</h3>
        <form action="/add_expense" method="POST">
            <input type="number" step="0.01" name="amount" placeholder="Amount" required>
            <input type="text" name="category" placeholder="Category" required>
            <input type="text" name="description" placeholder="Description">
            <button type="submit">Add</button>
        </form>
    </div>

    <!-- EXPENSE TABLE -->
    <h3>Your Expenses</h3>

    <table>
        <tr>
            <th>Amount</th>
            <th>Category</th>
            <th>Description</th>
            <th>Date</th>
        </tr>

        {% for expense in expenses %}
        <tr>
            <td>₹ {{ expense[1] }}</td>
            <td>{{ expense[2] }}</td>
            <td>{{ expense[3] }}</td>
            <td>{{ expense[4] }}</td>
        </tr>
        {% endfor %}
    </table>

    <div class="total-box">
        Total Expense: ₹ {{ total }}
    </div>

    <!-- REPORT LINKS -->
    <div class="links">
        <a href="/monthly_report">Monthly Report</a>
        <a href="/annual_report">Annual Report</a>
        <a href="/category_report">Category Report</a>
        <a href="/logout">Logout</a>
    </div>

</div>

</body>
</html>
