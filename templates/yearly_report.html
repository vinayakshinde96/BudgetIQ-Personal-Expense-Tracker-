<!DOCTYPE html>
<html>
<head>

    <title>Yearly Report — BudgetIQ</title>

    <!-- =============================================
         CHART.JS — Line chart library
         Loaded in <head> so it's ready before body
         ============================================= -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>

        /* =============================================
           RESET & BASE
           ============================================= */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* =============================================
           BODY — Dark finance-themed background
           ============================================= */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0f1b2d;
            min-height: 100vh;
            padding: 30px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* --- Radial glow accents --- */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse at 15% 25%, rgba(39,174,96,0.07) 0%, transparent 55%),
                radial-gradient(ellipse at 85% 75%, rgba(52,152,219,0.08) 0%, transparent 55%);
            pointer-events: none;
            z-index: 0;
        }

        /* --- Floating currency symbols --- */
        body::after {
            content: '₹  $  €  ₹  %  $  ↑  ₹  €  $  ↓  ₹  $  %  €  ₹  $  ↑  ₹  €';
            position: fixed;
            top: 0; left: 0;
            width: 200%;
            font-size: 18px;
            font-family: monospace;
            font-weight: 700;
            color: rgba(79,195,247,0.045);
            word-spacing: 2.2rem;
            line-height: 3.8rem;
            letter-spacing: 1.5rem;
            pointer-events: none;
            z-index: 0;
            white-space: pre-wrap;
            animation: bgScrollSyms 60s linear infinite;
        }

        @keyframes bgScrollSyms {
            0%   { transform: translateY(0); }
            100% { transform: translateY(-50%); }
        }

        /* =============================================
           LAYOUT — Centered column of cards
           ============================================= */
        .container {
            width: 90%;
            max-width: 860px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
            position: relative;
            z-index: 1;
        }

        /* =============================================
           CARD — Shared style for both sections
           ============================================= */
        .card {
            background: rgba(255,255,255,0.04);
            padding: 28px;
            border-radius: 18px;
            border: 0.5px solid rgba(79,195,247,0.18);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        /* =============================================
           HEADINGS
           ============================================= */
        h2 {
            color: #e3f2fd;
            font-size: 20px;
            text-align: center;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .chart-heading {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #90caf9;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .chart-heading::before { content: '📈'; font-size: 16px; }

        /* =============================================
           CHART CONTAINER
           ============================================= */
        .chart-container {
            background: rgba(255,255,255,0.03);
            border: 0.5px solid rgba(79,195,247,0.15);
            border-radius: 14px;
            padding: 20px;
            width: 100%;
            height: 340px;
            position: relative;
        }

        /* =============================================
           EXPENSE TABLE
           ============================================= */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 4px;
        }

        thead tr {
            background: rgba(79,195,247,0.09);
        }

        th {
            padding: 11px 14px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #90caf9;
            text-align: center;
            border-bottom: 0.5px solid rgba(79,195,247,0.22);
        }

        td {
            padding: 13px 14px;
            font-size: 13px;
            color: #cfe8ff;
            text-align: center;
            border-bottom: 0.5px solid rgba(255,255,255,0.05);
            transition: background 0.15s;
        }

        /* Year column */
        td:first-child {
            color: #90caf9;
            font-weight: 700;
            font-size: 15px;
        }

        /* Amount column — green monospace */
        td:last-child {
            color: #7ef9ac;
            font-weight: 700;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }

        tbody tr:hover {
            background: rgba(79,195,247,0.06);
        }

        /* =============================================
           BACK BUTTON
           ============================================= */
        .back-btn {
            background: #2980b9;
            color: #ffffff;
            padding: 9px 18px;
            border: none;
            border-radius: 9px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 20px;
            box-shadow: 0 2px 10px rgba(41,128,185,0.3);
            transition: filter 0.15s, transform 0.12s;
        }

        .back-btn:hover {
            filter: brightness(1.12);
            transform: translateY(-1px);
        }

        .back-btn:active {
            transform: scale(0.97);
        }

    </style>

</head>

<body>

    <div class="container">

        <!-- ── CARD 1 : TABLE ─────────────────────── -->
        <div class="card">

            <!-- Navigation -->
            <a href="/dashboard">
                <button class="back-btn">⬅ Back to Dashboard</button>
            </a>

            <!-- Table heading -->
            <h2>📊 Yearly Expense Table</h2>

            <table>
                <thead>
                    <tr>
                        <th>Year</th>
                        <th>Total Expense</th>
                    </tr>
                </thead>
                <tbody>
                    {% for row in data %}
                    <tr>
                        <td>{{ row.year }}</td>
                        <td>{{ row.total }}</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>

        </div>

        <!-- ── CARD 2 : LINE CHART ────────────────── -->
        <div class="card">

            <!-- Chart section label -->
            <div class="chart-heading">Yearly Expense Trend</div>

            <!-- Chart canvas wrapper -->
            <div class="chart-container">
                <canvas id="yearlyChart"></canvas>
            </div>

        </div>

    </div>


    <!-- =============================================
         CHART.JS CONFIGURATION
         Script placed at bottom so canvas DOM exists
         Data injected by Flask via Jinja2 filters
         ============================================= -->
    <script>

        // --- Canvas context ---
        const ctx = document.getElementById('yearlyChart').getContext('2d');

        // --- Year labels and totals passed from Flask ---
        const yearLabels  = {{ years   | tojson }};
        const yearAmounts = {{ amounts | tojson }};

        // --- Build the animated line chart ---
        new Chart(ctx, {

            type: 'line',

            data: {
                labels: yearLabels,
                datasets: [{
                    label: 'Yearly Expense (₹)',
                    data: yearAmounts,

                    /* Line styling */
                    borderColor: '#3498db',
                    borderWidth: 2.5,

                    /* Filled area under the line */
                    backgroundColor: 'rgba(52,152,219,0.12)',
                    fill: true,

                    /* Data point dots */
                    pointBackgroundColor: '#7ef9ac',
                    pointBorderColor: '#0f1b2d',
                    pointBorderWidth: 2,
                    pointRadius: 6,
                    pointHoverRadius: 9,

                    /* Smooth curve instead of sharp angles */
                    tension: 0.4
                }]
            },

            options: {
                responsive: true,
                maintainAspectRatio: false,

                plugins: {
                    legend: {
                        labels: {
                            color: '#90caf9',
                            font: { size: 12, weight: '600' }
                        }
                    },
                    tooltip: {
                        backgroundColor: 'rgba(15,27,45,0.95)',
                        borderColor: 'rgba(79,195,247,0.3)',
                        borderWidth: 1,
                        titleColor: '#90caf9',
                        bodyColor: '#7ef9ac',
                        callbacks: {
                            /* Add ₹ symbol to tooltip value */
                            label: function(context) {
                                return '  ₹' + context.parsed.y.toLocaleString();
                            }
                        }
                    }
                },

                scales: {
                    x: {
                        ticks: { color: '#90caf9', font: { size: 13, weight: '600' } },
                        grid:  { color: 'rgba(79,195,247,0.07)' }
                    },
                    y: {
                        ticks: {
                            color: '#90caf9',
                            font: { size: 12 },
                            /* ₹ prefix on every Y-axis label */
                            callback: function(value) {
                                return '₹' + value.toLocaleString();
                            }
                        },
                        grid: { color: 'rgba(79,195,247,0.07)' }
                    }
                },

                /* Smooth entrance animation */
                animation: {
                    duration: 900,
                    easing: 'easeInOutQuart'
                }
            }
        });

    </script>

</body>
</html>
